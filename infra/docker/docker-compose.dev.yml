version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=last_hope
    ports: ["5432:5432"]
    volumes: [ dbdata:/var/lib/postgresql/data ]

  cache:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend.Dockerfile
    env_file: [ ../../.env ]
    volumes: [ ../../apps/backend:/app ]
    depends_on: [ db, cache ]
    ports: ["8000:8000"]
    command: uvicorn uvicorn_app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/frontend.Dockerfile
    env_file: [ ../../.env ]
    volumes: [ ../../apps/frontend:/app ]
    depends_on: [ backend ]
    ports: ["3000:3000"]
    command: npm run dev

  fingpt:
    build:
      context: ../../
      dockerfile: infra/docker/fingpt.Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes: [ modelcache:/models ]
    ports: ["9000:9000"]

volumes:
  dbdata: {}
  modelcache: {}
